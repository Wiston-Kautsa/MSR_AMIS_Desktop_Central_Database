spring:
  config:
    import: optional:file:.env[.properties],optional:file:../.env[.properties]
  application:
    name: msr-amis-api
  datasource:
    url: ${MSR_AMIS_DB_URL:jdbc:postgresql://localhost:5432/msr_amis}
    username: ${MSR_AMIS_DB_USERNAME}
    password: ${MSR_AMIS_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    placeholders:
      primarySuperAdminEmail: ${MSR_AMIS_PRIMARY_SUPER_ADMIN_EMAIL:}
      setupAdminEmail: ${MSR_AMIS_SETUP_ADMIN_EMAIL:}
      setupUserEmail: ${MSR_AMIS_SETUP_USER_EMAIL:}

server:
  port: ${MSR_AMIS_API_PORT:${PORT:8090}}

management:
  endpoints:
    web:
      exposure:
        include: health

app:
  security:
    jwt:
      secret: ${MSR_AMIS_JWT_SECRET}
      expiration-seconds: ${MSR_AMIS_JWT_EXPIRATION_SECONDS:28800}
    password-reset:
      expose-code-when-email-disabled: ${MSR_AMIS_EXPOSE_RESET_CODE_ON_EMAIL_FAILURE:false}
